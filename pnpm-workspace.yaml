packages:
  - .
  - ./platform
  - ./example/client

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - '@hono/node-server@1.19.13'
  - hono@4.12.14
  - '@esbuild/*'
  - esbuild@0.27.7 || 0.28.0
  - vite@7.3.2 || 8.0.7
  - '@vitest/*'
  - vitest@4.1.3
  - '@next/*'
  - next@16.2.3

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - unrs-resolver

overrides:
  '@eslint/js': '>=10'
  '@types/node': ^24
  brace-expansion@<1.1.13: '>=1.1.13'
  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3'
  chokidar: '>=5'
  defu@<=6.1.4: '>=6.1.5'
  eslint: '>=10'
  eslint-import-resolver-typescript: '>=4'
  flatted@<=3.4.1: '>=3.4.2'
  h3@<1.15.6: '>=1.15.6'
  h3@<1.15.9: '>=1.15.9'
  h3@<=1.15.4: '>=1.15.5'
  h3@<=1.15.8: '>=1.15.9'
  hono@<4.12.14: '>=4.12.14'
  markdown-it@>=13.0.0 <14.1.1: '>=14.1.1'
  protobufjs@<7.5.5: '>=7.5.5'
  semver: '>=7'
  serialize-javascript@<=7.0.2: '>=7.0.3'
  vite@<=6.4.1: '>=6.4.2'
  vite@>=6.0.0 <=6.4.1: '>=6.4.2'
  vite@>=7.0.0 <=7.3.1: '>=7.3.2'
  vite@>=7.1.0 <=7.3.1: '>=7.3.2'
  vite@>=8.0.0 <=8.0.4: '>=8.0.5'

trustPolicy: no-downgrade
